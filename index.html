        <aside class="right-panel" aria-label="Tom högersida">
            <div class="todo-app">
                <h2>Att göra:</h2>
                <div class="rad">
                    <input type="text" id="input-box" placeholder="Skriv här">
                    <button class="btn" id="right-btn" onclick="addTask()">Lägg till</button>
                </div>

                <!--<li class="checked">Task 1</li>

            </ul>

    </main>

    <!--Popup för Utlångingen-->
    <dialog id="loanDialog" class="dialog">
        <form method="dialog" id="loanForm" class="dialog__panel" aria-labelledby="dialog-title">
            <h3 id="dialog-title">Låna ut dator</h3>
            <label class="field">
                <span class="field__label">Låntagare</span>
                <input id="borrowerInput" class="field__control" type="text" placeholder="Skriv in namn" required />
            </label>

            <label class="field">
                <span class="field__label">Förväntat returdatum</span>

                <div class="date-inline">
                    <input id="returnDate" class="field__control" type="date" lang="sv" />

                    <label class="inline-check">
                        <input id="noReturnDate" type="checkbox" />
                        <span>Ingen deadline</span>
                    </label>
                </div>
            </label>

            <div class="dialog__actions">
                <button value="cancel" class="btn btn--ghost" formnovalidate>Avbryt</button>
                <button value="confirm" class="btn">Bekräfta utlåning</button>
            </div>
        </form>
    </dialog>
